<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Yönetici Girişi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-emerald-400 via-sky-500 to-violet-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl border border-white/20 p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-gray-800 tracking-tight text-center mb-6">🔐 Yönetici Girişi</h1>
        
        {% if error %}
        <div class="bg-gradient-to-r from-red-50 to-rose-100 border-l-4 border-red-500 text-red-800 p-4 rounded-xl mb-6">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kullanıcı Adı</label>
                <input type="text" name="username" required class="bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-3 focus:ring-4 focus:ring-sky-300 focus:border-sky-400 transition-all outline-none w-full" placeholder="admin">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
                <input type="password" name="password" required class="bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-3 focus:ring-4 focus:ring-sky-300 focus:border-sky-400 transition-all outline-none w-full" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-rose-500 to-orange-400 hover:from-rose-600 hover:to-orange-500 text-white font-semibold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.03] transition-all duration-300">
                Giriş Yap
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-600 hover:text-gray-800 transition">← Ana Sayfaya Dön</a>
        </div>
    </div>
</body>
</html>
